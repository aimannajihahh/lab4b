<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Display Books</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <h1>Check Console for Book Details</h1>

    <script>
        $(document).ready(function(){

            //menarik data daripada fail(books.json)
            $.getJSON("books.json", function(data){
                
                //title of the first book
                console.log("First Book Title: " + data[0].title);

                //author of the second book 
                console.log("Second Book Author: " + data[1].author);

                //genres of all books menggunakan jQuery $.each 
                console.log("All Genres:");
                $.each(data, function(index, book){
                    console.log(book.title + " Genres: " + book.genres);
                });
            });
        });
    </script>
</body>
</html>
