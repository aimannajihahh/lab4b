<!DOCTYPE html>
<html lang="en">
<head>
    <title>Display Books</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
    <h1>Check Console for Book Details</h1>

    <script>
        $(document).ready(function(){
            $.getJSON("books.json", function(data){
                // a. Title of the first book
                console.log("First Book Title: " + data[0].title);

                // b. Author of the second book
                console.log("Second Book Author: " + data[1].author);

                // c. Genres of all books
                console.log("Genres of all books:");
                $.each(data, function(index, book){
                    console.log("Book " + (index + 1) + ": " + book.genres);
                });
            });
        });
    </script>
</body>
</html>
