<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Display Books</title>
</head>
<body>
    <h1>Check Console for Book Details</h1>

    <script>
       const bookData = {
            "Books": [
                {

                    "title": "The Great Gatsby",

                    "author": "F. Scott Fitzgerald",

                    "publicationYear": 1925,

                    "genres": ["Fiction", "Classics"]
                },
                {
                    "title": "To Kill a Mockingbird",

                    "author": "Harper Lee",

                    "publicationYear": 1960,

                    "genres": ["Fiction", "Coming-of-Age"]
                }
            ]
        };
        
        //title of the first book
        console.log("First Book Title:", bookData.Books[0].title);

        //author of the second book
        console.log("Second Book Author:", bookData.Books[1].author);

        //genres of all books
        console.log("All Genres:");
        bookData.Books.forEach(book => {
            console.log(book.title + " Genres:", book.genres.join(", "));
        });
    </script>
</body>

</html>
